name: Feature request
description: Suggest a safe improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
  - type: checkboxes
    id: safety
    attributes:
      label: Safety
      options:
        - label: This request does not require unsafe default hardware writes.
          required: true
